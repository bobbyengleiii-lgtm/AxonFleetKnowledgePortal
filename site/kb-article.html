<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KB Article</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body data-page="article">

  <div class="nav">
    <div class="nav-inner">
      <div class="brand">
        <div class="brand-badge">A</div>
        AXON
      </div>
      <div class="nav-links">
        <a href="./index.html">Home</a>
        <a href="./kb-articles.html" class="active">KB Articles</a>
      </div>
      <div class="nav-right">
        <button class="btn primary" id="submitBtn">Submit KB Article</button>
        <div class="icon">⚙</div>
        <div class="icon">?</div>
        <div class="icon">👤</div>
      </div>
    </div>
  </div>

  <main class="container">
    <div class="card article">
      <h1 id="title">Loading…</h1>
      <div class="meta-line" id="meta"></div>
      <div class="hr"></div>

      <div class="kv">
        <h3>Summary</h3>
        <p id="summary">—</p>
      </div>

      <div class="hr"></div>

      <div class="article-grid">
        <div class="kv">
          <h3>Applies To</h3>
          <div id="applies"></div>

          <div class="hr"></div>

          <h3>Steps</h3>
          <div id="steps"></div>

          <div class="hr"></div>

          <a id="sourceLink" class="rowlink" href="#" target="_blank" rel="noopener">Open source (GitHub)</a>
        </div>

        <aside class="side">
          <div class="box">
            <h3>Attachments</h3>
            <div id="attachments"></div>
          </div>

          <div class="box">
            <h3>Was this helpful?</h3>
            <div class="help-row">
              <button class="btn primary" id="yesBtn">Yes</button>
              <button class="btn" id="noBtn">No</button>
            </div>
            <button class="btn" style="margin-top:10px; width:100%;" id="requestBtn">Request Update</button>
            <div class="note">Feedback is stored locally for now (no backend).</div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script src="./assets/app.js"></script>
</body>
</html>
