name: Create KB Article File from Submission

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: read

jobs:
  build_kb_file:
    # Only run for KB submission issues (your form applies these labels)
    if: contains(github.event.issue.labels.*.name, 'kb')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Convert Issue Form -> kb/articles/*.md
        run: |
          python3 - <<'PY'
          import json, re, os, datetime, pathlib

          issue = json.loads(r'''${{ toJson(github.event.issue) }}''')
          body = issue.get("body","")

          def grab(heading):
            """
            GitHub Issue Forms render as markdown sections:
            ### <Label>
            <value>
            """
            m = re.search(rf"^###\s+{re.escape(heading)}\s*\n+([\s\S]*?)(?=\n###\s+|\Z)", body, re.M)
            if not m:
              return ""
            val = m.group(1).strip()
            if val.lower() == "_no response_":
              return ""
            return val

          # --- Match YOUR EXACT labels ---
          title        = grab("Article Title") or issue.get("title","").replace("[KB RCA]","").strip()
          article_id   = grab("Article ID (unique)")
          product      = grab("Product")
          category     = grab("Category")
          tags_raw     = grab("Tags")
          severity     = grab("Severity")
          status       = grab("Status")
          owner        = grab("Owner")
          last_verified= grab("Last Verified (YYYY-MM-DD)")

          client_issue = grab("1) Client Issue Description")
          symptoms     = grab("2) Observed Symptoms")
          root_cause   = grab("3) Root Cause")
          resolution   = grab("4) Resolution Performed")
          prevention   = grab("5) Prevention / Education Provided")
          references   = grab("References / Attachments (optional)")

          # Normalize tags -> YAML list
          tags = [t.strip() for t in tags_raw.split(",") if t.strip()]

          # Fallbacks
          if not article_id:
            # slugify title if user forgot
            slug = re.sub(r"[^a-z0-9]+", "-", (title or "kb-article").lower()).strip("-")
            article_id = slug

          issue_no = issue["number"]
          today = datetime.date.today().isoformat()

          # Filename keeps issue number + article_id for uniqueness
          filename = f"{issue_no:04d}-{article_id}.md"

          out_dir = pathlib.Path("kb/articles")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_path = out_dir / filename

          md = f"""---
          article_id: {article_id}
          title: {title}
          product: {product}
          category: {category}
          tags: [{", ".join(tags)}]
          severity: {severity}
          status: {status}
          owner: {owner}
          last_verified: {last_verified}
          source_issue: {issue.get("html_url","")}
          updated: {today}
          ---

          # {title}

          ## 1) Client Issue Description
          {client_issue}

          ## 2) Observed Symptoms
          {symptoms}

          ## 3) Root Cause
          {root_cause}

          ## 4) Resolution Performed
          {resolution}

          ## 5) Prevention / Education Provided
          {prevention}

          ## References / Attachments
          {references if references else ""}
          """

          # clean trailing spaces + ensure newline
          md = "\n".join([line.rstrip() for line in md.splitlines()]) + "\n"
          out_path.write_text(md, encoding="utf-8")

          print(f"Wrote: {out_path}")
          PY

      - name: Commit kb article file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kb/articles/*.md
          git diff --cached --quiet || git commit -m "KB: add/update article from issue #${{ github.event.issue.number }}"
          git push
