name: Create KB Article File from Submission

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: read

concurrency:
  group: kb-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  build_kb_file:
    if: contains(github.event.issue.labels.*.name, 'kb')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Convert Issue Form -> kb/articles/*.md
        shell: bash
        run: |
          python3 - <<'PY'
          import json, re, datetime, pathlib, textwrap

          issue = json.loads(r'''${{ toJson(github.event.issue) }}''')
          body = issue.get("body", "")

          def grab(heading):
              m = re.search(
                  rf"^###\s+{re.escape(heading)}\s*\n+([\s\S]*?)(?=\n###\s+|\Z)",
                  body,
                  re.M
              )
              if not m:
                  return ""
              val = m.group(1).strip()
              if val.lower() == "_no response_":
                  return ""
              return val

          def clean_scalar(value):
              if value is None:
                  return '""'
              value = str(value).strip().replace('"', '\\"')
              return f'"{value}"'

          def slugify(text):
              return re.sub(r"[^a-z0-9]+", "-", (text or "").lower()).strip("-")

          title         = grab("Article Title") or issue.get("title", "").replace("[KB RCA]", "").strip()
          article_id    = grab("Article ID (unique)")
          product       = grab("Product")
          category      = grab("Category")
          tags_raw      = grab("Tags")
          severity      = grab("Severity")
          status        = grab("Status")
          owner         = grab("Owner")
          last_verified = grab("Last Verified (YYYY-MM-DD)")

          client_issue  = grab("1) Client Issue Description")
          symptoms      = grab("2) Observed Symptoms")
          root_cause    = grab("3) Root Cause")
          resolution    = grab("4) Resolution Performed")
          prevention    = grab("5) Prevention / Education Provided")
          references    = grab("References / Attachments (optional)")

          if not title:
              title = "Untitled KB Article"

          if not article_id:
              article_id = slugify(title) or "kb-article"

          tags = [t.strip() for t in tags_raw.split(",") if t.strip()]
          safe_tags = ", ".join(f'"{t.replace(chr(34), chr(92)+chr(34))}"' for t in tags)

          issue_no = issue["number"]
          today = datetime.date.today().isoformat()

          filename = f"{issue_no:04d}-{article_id}.md"

          out_dir = pathlib.Path("kb/articles")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_path = out_dir / filename

          md = textwrap.dedent(f"""\
          ---
          article_id: {clean_scalar(article_id)}
          title: {clean_scalar(title)}
          product: {clean_scalar(product)}
          category: {clean_scalar(category)}
          tags: [{safe_tags}]
          severity: {clean_scalar(severity)}
          status: {clean_scalar(status)}
          owner: {clean_scalar(owner)}
          last_verified: {clean_scalar(last_verified)}
          source_issue: {clean_scalar(issue.get("html_url", ""))}
          updated: {clean_scalar(today)}
          ---

          # {title}

          ## 1) Client Issue Description
          {client_issue}

          ## 2) Observed Symptoms
          {symptoms}

          ## 3) Root Cause
          {root_cause}

          ## 4) Resolution Performed
          {resolution}

          ## 5) Prevention / Education Provided
          {prevention}
          """)

          if references:
              md += f"\n## References / Attachments\n{references}\n"

          md = "\n".join(line.rstrip() for line in md.splitlines()) + "\n"
          out_path.write_text(md, encoding="utf-8")

          print(f"Wrote: {out_path}")
          PY

      - name: Commit KB article file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kb/articles/*.md
          git diff --cached --quiet || git commit -m "KB: add/update article from issue #${{ github.event.issue.number }}"
          git push
