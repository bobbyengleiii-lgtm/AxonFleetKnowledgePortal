name: Create KB file from KB Issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: read

jobs:
  issue_to_kb:
    # only run when the issue has the kb label
    if: contains(github.event.issue.labels.*.name, 'kb')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build KB markdown file
        id: build
        run: |
          python3 - <<'PY'
          import os, re, json, datetime, pathlib

          issue = json.loads(r'''${{ toJson(github.event.issue) }}''')
          title = issue["title"].replace("[KB]", "").strip() or "KB Article"
          body = issue.get("body","")

          def grab(label):
            # Matches "### Label" blocks from GitHub Issue Forms
            m = re.search(rf"^###\s+{re.escape(label)}\s*\n+([\s\S]*?)(?=\n###\s+|\Z)", body, re.M)
            if not m: 
              return ""
            val = m.group(1).strip()
            # Forms sometimes put "_No response_"
            return "" if val.lower() == "_no response_" else val

          category = grab("Category")
          product  = grab("Product")
          tags_raw = grab("Tags (comma separated)")
          status   = grab("Status") or "Draft"

          client_issue = grab("Client Issue Description")
          symptoms     = grab("Observed Symptoms")
          root_cause   = grab("Root Cause")
          resolution   = grab("Resolution Performed")
          prevention   = grab("Prevention / Education Provided")

          tags = [t.strip() for t in tags_raw.split(",") if t.strip()]
          date = datetime.date.today().isoformat()

          # slugify
          slug = re.sub(r"[^a-z0-9]+", "-", title.lower()).strip("-")
          issue_no = issue["number"]
          filename = f"{issue_no:04d}-{slug}.md"

          out_dir = pathlib.Path("kb/articles")
          out_dir.mkdir(parents=True, exist_ok=True)
          out_path = out_dir / filename

          md = f"""---
          article_id: {issue_no:04d}
          title: {title}
          product: {product}
          category: {category}
          tags: [{", ".join(tags)}]
          status: {status}
          owner: {issue.get("user",{}).get("login","")}
          updated: {date}
          source_issue: {issue.get("html_url","")}
          ---

          # {title}

          ## Client Issue Description
          {client_issue}

          ## Observed Symptoms
          {symptoms}

          ## Root Cause
          {root_cause}

          ## Resolution Performed
          {resolution}

          ## Prevention / Education Provided
          {prevention}
          """

          # clean indent
          md = "\n".join([line.rstrip() for line in md.splitlines()]) + "\n"
          out_path.write_text(md, encoding="utf-8")

          print(f"Wrote {out_path}")
          PY

      - name: Commit KB file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kb/articles/*.md
          git diff --cached --quiet || git commit -m "KB: create/update article from issue #${{ github.event.issue.number }}"
          git push
