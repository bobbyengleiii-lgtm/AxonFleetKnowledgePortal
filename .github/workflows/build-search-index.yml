name: Build KB Search Index

on:
  push:
    branches: [ "main" ]
    paths:
      - "kb/**"
      - "assets/**"
      - ".github/workflows/build-search-index.yml"

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build search-index.json from kb articles
        run: |
          python3 - <<'PY'
          import os, re, json, glob

          def unquote(v):
              v = (v or "").strip()
              if len(v) >= 2 and v[0] == '"' and v[-1] == '"':
                  v = v[1:-1].replace('\\"', '"')
              return v.strip()

          def parse_front_matter(text):
              fm = {}
              m = re.match(r"^---\n(.*?)\n---\n(.*)$", text, re.S)
              if not m:
                  return fm, text

              y, body = m.group(1), m.group(2)

              for line in y.splitlines():
                  if ":" not in line:
                      continue
                  k, v = line.split(":", 1)
                  fm[k.strip()] = v.strip()

              if "tags" in fm:
                  t = fm["tags"].strip()
                  if t.startswith("[") and t.endswith("]"):
                      inner = t[1:-1].strip()
                      fm["tags"] = [unquote(x.strip()) for x in inner.split(",") if x.strip()]
                  else:
                      fm["tags"] = [unquote(t)]
              else:
                  fm["tags"] = []

              return fm, body

          docs = []

          # catch both .md and .MD
          paths = glob.glob("kb/**/*.md", recursive=True) + glob.glob("kb/**/*.MD", recursive=True)

          for path in sorted(set(paths)):
              with open(path, "r", encoding="utf-8") as f:
                  text = f.read()

              fm, body = parse_front_matter(text)

              title = unquote(fm.get("title", ""))
              if not title:
                  mh1 = re.search(r"^#\s+(.+)$", body, re.M)
                  title = mh1.group(1).strip() if mh1 else os.path.basename(path)

              docs.append({
                  "article_id": unquote(fm.get("article_id", "")),
                  "title": title,
                  "product": unquote(fm.get("product", "")),
                  "category": unquote(fm.get("category", "")),
                  "tags": fm.get("tags", []),
                  "status": unquote(fm.get("status", "")),
                  "owner": unquote(fm.get("owner", "")),
                  "updated": unquote(fm.get("updated", "")),
                  "last_verified": unquote(fm.get("last_verified", "")),
                  "path": path,
                  "url": f"./kb-article.html?id={unquote(fm.get('article_id', '')) or path}",
                  "content": body.strip()
              })

          docs.sort(key=lambda d: (d.get("updated") or d.get("last_verified") or ""), reverse=True)

          os.makedirs("assets", exist_ok=True)
          output_path = "assets/search-index.json"

          with open(output_path, "w", encoding="utf-8") as f:
              json.dump(docs, f, ensure_ascii=False, indent=2)

          print(f"Wrote valid JSON with {len(docs)} docs to {output_path}")
          PY

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/search-index.json
          git diff --cached --quiet || git commit -m "Update KB search index"
          git push
