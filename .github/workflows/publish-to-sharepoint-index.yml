name: Publish KB Index to SharePoint (Power Automate)

on:
  push:
    branches: [ "main" ]
    paths:
      - "kb/articles/**/*.md"

jobs:
  publish-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed KB article files
        id: changed
        shell: bash
        run: |
          set -e
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          files=$(git diff --name-only "$BEFORE" "$AFTER" | grep -E '^kb/articles/.*\.md$' || true)

          echo "Changed files:"
          echo "$files"

          # Output multiline safely
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish each changed article to SharePoint index
        if: steps.changed.outputs.files != ''
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          post_article () {
            local file="$1"

            # Extract front-matter (--- ... ---)
            local fm
            fm=$(awk 'BEGIN{p=0} /^---\s*$/{if(p==0){p=1;next}else{exit}} p==1{print}' "$file" || true)

            # Basic required fields from front-matter
            # (simple YAML parsing via grep/sed for top-level keys)
            get_yaml () {
              local key="$1"
              echo "$fm" | grep -E "^${key}:" | head -n1 | sed -E "s/^${key}:\s*//" | sed -E 's/^"|"$//g'
            }

            article_id=$(get_yaml "article_id" | tr -d '\r')
            title=$(get_yaml "title" | tr -d '\r')
            product=$(get_yaml "product" | tr -d '\r')
            category=$(get_yaml "category" | tr -d '\r')
            severity=$(get_yaml "severity" | tr -d '\r')
            status=$(get_yaml "status" | tr -d '\r')
            owner=$(get_yaml "owner" | tr -d '\r')
            last_verified=$(get_yaml "last_verified" | tr -d '\r')

            if [[ -z "$article_id" || -z "$title" ]]; then
              echo "Skipping $file (missing article_id or title in front-matter)"
              return
            fi

            # Build Article URL (GitHub blob URL). You can later change this to docs-site URL without changing SharePoint list schema.
            article_url="${SERVER_URL}/${REPO}/blob/main/${file}"

            # Extract RCA sections (best-effort) to populate SharePoint searchable fields
            # We’ll pull the text under each heading until the next heading.
            extract_section () {
              local heading="$1"
              python3 - <<'PY'
import re, sys
file_path = sys.argv[1]
heading = sys.argv[2]
text = open(file_path, "r", encoding="utf-8").read()

# Match "## Heading" blocks
pattern = rf"^##\s+{re.escape(heading)}\s*$"
m = re.search(pattern, text, flags=re.M)
if not m:
    print("")
    sys.exit(0)

start = m.end()
# Find next "## " heading after start
n = re.search(r"^##\s+.+$", text[start:], flags=re.M)
end = start + (n.start() if n else len(text[start:]))

section = text[start:end].strip()
# Remove leading/trailing markdown artifacts a bit
section = re.sub(r"^\s*[\r\n]+", "", section)
print(section.strip())
PY
              "$file" "$heading"
            }

            cid=$(extract_section "Client Issue Description" || true)
            obs=$(extract_section "Observed Symptoms" || true)
            rc=$(extract_section "Root Cause" || true)
            res=$(extract_section "Resolution Performed" || true)
            prev=$(extract_section "Prevention / Education Provided" || true)

            # Normalize tags list from YAML line "tags: [a, b]" (best effort)
            tags_line=$(echo "$fm" | grep -E "^tags:" | head -n1 | sed -E "s/^tags:\s*//" | tr -d '\r')
            tags_clean=$(echo "$tags_line" | sed -E 's/^\[//; s/\]$//; s/"//g' | sed -E 's/\s*,\s*/;/g' | tr -d ' ')

            # Last updated = commit timestamp (UTC ISO date)
            last_updated=$(date -u +"%Y-%m-%d")

            # Build payload
            payload=$(python3 - <<PY
import json
print(json.dumps({
  "article_id": "$article_id",
  "title": "$title",
  "product": "$product",
  "category": "$category",
  "tags": "$tags_clean",
  "severity": "$severity",
  "status": "$status",
  "owner": "$owner",
  "last_verified": "$last_verified",
  "last_updated": "$last_updated",
  "article_url": "$article_url",
  "source_path": "$file",
  "commit_sha": "$SHA",
  "repo": "$REPO",
  "pull_request_url": "",
  "rca": {
    "client_issue_description": "$cid",
    "observed_symptoms": "$obs",
    "root_cause": "$rc",
    "resolution_performed": "$res",
    "prevention_education_provided": "$prev"
  }
}, ensure_ascii=False))
PY
)

            echo "Posting to Power Automate for: $article_id"
            curl -sS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$payload" > /dev/null

            echo "Done: $article_id"
          }

          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            post_article "$f"
          done <<< "${{ steps.changed.outputs.files }}"
