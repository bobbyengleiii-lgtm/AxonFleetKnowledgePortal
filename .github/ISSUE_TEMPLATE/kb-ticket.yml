name: "Submit KB Article (RCA)"
description: "Submit a Knowledge Base RCA article for review and publishing."
title: "[KB RCA] "
labels: ["kb", "submission", "needs-triage"]
body:
  - type: input
    id: article_title
    attributes:
      label: Article Title
      description: "Short, searchable title for the KB article."
      placeholder: "Evidence Offload Stuck on Dashboard"
    validations:
      required: true

  - type: input
    id: article_id
    attributes:
      label: Article ID (unique)
      description: "Unique lowercase/hyphenated slug used for the KB article."
      placeholder: "fleet3-trbl-evidence-offload-stuck"
    validations:
      required: false

  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - Fleet 3
        - Body 4
        - Axon Respond
        - Axon Evidence
        - TASER
        - Interview
        - Other
    validations:
      required: true

  - type: input
    id: category
    attributes:
      label: Category
      description: "Primary troubleshooting category."
      placeholder: "Networking"
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated search tags."
      placeholder: "wifi offload, static ip, evidence sync, cradlepoint"
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: false

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Draft
        - Review Needed
        - Approved
        - Published
    validations:
      required: false

  - type: input
    id: owner
    attributes:
      label: Owner
      description: "Person responsible for the article."
      placeholder: "Bobby Engle"
    validations:
      required: false

  - type: input
    id: last_verified
    attributes:
      label: Last Verified (YYYY-MM-DD)
      description: "Date this issue/resolution was last confirmed."
      placeholder: "2026-03-05"
    validations:
      required: false

  - type: textarea
    id: client_issue_description
    attributes:
      label: 1) Client Issue Description
      description: "What the client reported, including timeline/frequency/context."
      placeholder: |
        The agency reported intermittent random camera activations occurring across multiple vehicles following initial installation.
    validations:
      required: true

  - type: textarea
    id: observed_symptoms
    attributes:
      label: 2) Observed Symptoms
      description: "What was confirmed during inspection, testing, or log review."
      placeholder: |
        - Random activations occurred with ignition state changes
        - Trigger input showed unstable voltage
        - Behavior was repeatable on multiple vehicles
    validations:
      required: true

  - type: textarea
    id: root_cause
    attributes:
      label: 3) Root Cause
      description: "Underlying reason the issue occurred."
      placeholder: |
        A miswired trigger source introduced unstable voltage to the activation input, causing false activations.
    validations:
      required: true

  - type: textarea
    id: resolution_performed
    attributes:
      label: 4) Resolution Performed
      description: "Exactly what was changed or corrected."
      placeholder: |
        Verified wiring path, moved trigger source to the proper ignition reference, retested system operation, and confirmed normal activation behavior.
    validations:
      required: true

  - type: textarea
    id: prevention_education
    attributes:
      label: 5) Prevention / Education Provided
      description: "Steps given to prevent recurrence."
      placeholder: |
        Advised installer to validate trigger voltage before final termination and follow the Golden Standard wiring checklist for future installs.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References / Attachments (optional)
      description: "Paste links, ticket numbers, screenshots, logs, or related notes."
      placeholder: |
        Jira: AXON-12345
        NetCloud screenshots attached
        Related RCA: fleet3-trigger-voltage-instability
    validations:
      required: false
