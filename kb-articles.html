<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KB Articles</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body data-page="list">

  <div class="nav">
    <div class="nav-inner">
      <div class="brand">
        <div class="brand-badge">A</div>
        AXON
      </div>
      <div class="nav-links">
        <a href="./index.html">Home</a>
        <a href="./kb-articles.html" class="active">KB Articles</a>
      </div>
      <div class="nav-right">
        <button class="btn primary" id="submitBtn">Submit KB Article</button>
        <div class="icon">⚙</div>
        <div class="icon">?</div>
        <div class="icon">👤</div>
      </div>
    </div>
  </div>

  <main class="container">
    <div class="card" style="padding:14px;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <h1 class="page-title">KB Articles</h1>
        <div class="meta" id="statusText">Loading…</div>
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="filters">
        <select id="categoryFilter" class="select">
          <option value="">All Categories</option>
        </select>
        <select id="productFilter" class="select">
          <option value="">All Products</option>
        </select>
        <select id="statusFilter" class="select">
          <option value="">All Status</option>
        </select>
        <select id="tagFilter" class="select">
          <option value="">All Tags</option>
        </select>
        <input id="searchInput" class="input" placeholder="Search…" />
        <button class="btn" id="clearFilters">Clear</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Product</th>
              <th>Category</th>
              <th>Severity</th>
              <th>Status</th>
              <th>Owner</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody id="kbTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="./assets/apps.js"></script>
</body>
</html>
